<!DOCTYPE html>
<html>

<head>
    <title>Island Builder</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            background-color: #2e8b57;
        }

        /* =========================
        WORLD & VIEWS
        ========================= */
        #game, #quarry {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        #game {
            background: linear-gradient(
                to bottom,
                #87ceeb 0%,
                #87ceeb 55%,
                #3cb371 55%,
                #2e8b57 100%
            );
            display: block;
        }

        #quarry {
            display: none;
            background: linear-gradient(
                to bottom,
                #777,
                #222
            );
        }

        /* =========================
        TOP BAR
        ========================= */
        #topBar {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }

        button {
            padding: 8px 16px;
            cursor: pointer;
            background: #fff;
            border: 1px solid #ccc;
            font-weight: bold;
            border-radius: 4px;
        }

        button:hover {
            background: #eee;
        }

        /* =========================
        OBJECTS
        ========================= */
        .object {
            position: absolute;
            image-rendering: pixelated;
            cursor: pointer;
            transition: .15s;
        }

        /* FULL SCREEN TREE BACKGROUND SETUP */
        #tree {
            width: 100vw;
            height: 45vh; /* Fits perfectly within the lower green grass zone */
            left: 0;
            top: 55%;
            object-fit: contain; /* Prevents distortion while stretching full width */
        }
        
        #tree:hover {
            transform: scale(1.02);
        }

        #teleporter {
            width: 130px;
            left: 80%;
            top: 65%;
            display: none;
            z-index: 10;
        }

        #quarryMiner {
            position: absolute;
            width: 220px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }
        #quarryMiner:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* =========================
        SHOP
        ========================= */
        #shop {
            display: none; 
            position: fixed;
            right: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #f5e0b7;
            color: black;
            padding: 15px;
            box-sizing: border-box;
            z-index: 999;
            border-left: 3px solid #d4b887;
        }

        /* =========================
        TEXT & UI
        ========================= */
        #stats, #quarryStats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, .4);
            padding: 10px;
            border-radius: 4px;
            pointer-events: none;
            line-height: 1.5;
            z-index: 10;
        }

        .floating {
            position: absolute;
            animation: float 1s forwards;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            z-index: 2000;
        }

        @keyframes float {
            from {
                opacity: 1;
                transform: translate(-50%, 0);
            }
            to {
                opacity: 0;
                transform: translate(-50%, -80px);
            }
        }
    </style>
</head>

<body>

    <div id="topBar">
        <button onclick="saveGame()">Save</button>
    </div>

    <div id="game">
        <img id="tree" class="object" src="assets/tree.png" onclick="gatherWood(event)">
        <img id="teleporter" class="object" src="assets/teleporter.png" onclick="enterQuarry()">
        <div id="stats"></div>
    </div>

    <div id="quarry">
        <img id="quarryMiner" src="assets/miner.png" onclick="mineStone(event)">
        <div id="quarryStats"></div>
        <button onclick="leaveQuarry()" style="position: absolute; bottom: 20px; left: 20px;">Return to Island</button>
    </div>

    <div id="shop">
        <h2>Shop 🛒</h2>
        <hr>
        <p>Future upgrades here</p>
    </div>

    <script>
        /* =========================
        STATE
        ========================= */
        let wood = 0;
        let stone = 0;
        let tpUnlocked = false;
        let currentArea = "Island";

        /* =========================
        WOOD RESOURCE
        ========================= */
        function gatherWood(event) {
            wood++;
            popup("+1 Wood", event.clientX, event.clientY);
            checkUnlock();
            update();
        }

        /* =========================
        UNLOCK CHECKER
        ========================= */
        function checkUnlock() {
            if (wood >= 250 && !tpUnlocked) {
                tpUnlocked = true;
                document.getElementById("teleporter").style.display = "block";
                document.getElementById("shop").style.display = "block";
                popup("Teleporter & Shop Unlocked!", window.innerWidth / 2, window.innerHeight / 2);
            }
        }

        /* =========================
        ... (Rest of navigation, stone, popup, update, and storage methods remain identical) ...
        ========================= */
        function enterQuarry() {
            document.getElementById("game").style.display = "none";
            document.getElementById("quarry").style.display = "block";
            currentArea = "Quarry";
            update();
        }

        function leaveQuarry() {
            document.getElementById("quarry").style.display = "none";
            document.getElementById("game").style.display = "block";
            currentArea = "Island";
            update();
        }

        function mineStone(event) {
            stone++;
            popup("+1 Stone", event.clientX, event.clientY);
            update();
        }

        function popup(text, x, y) {
            let p = document.createElement("div");
            p.innerText = text;
            p.className = "floating";
            p.style.left = x + "px";
            p.style.top = y + "px";
            document.body.appendChild(p);
            setTimeout(() => { p.remove(); }, 1000);
        }

        function update() {
            if (currentArea === "Island") {
                document.getElementById("stats").innerHTML = `
                    Area: Island 🌴<br>
                    Wood: ${wood}<br>
                    Stone: ${stone}<br><br>
                    ${!tpUnlocked ? "Need 250 Wood for Teleporter" : "Teleporter unlocked!"}
                `;
            } else {
                document.getElementById("quarryStats").innerHTML = `
                    Area: Quarry 🪨<br>
                    Wood: ${wood}<br>
                    Stone: ${stone}
                `;
            }
        }

        function saveGame() {
            localStorage.setItem("wood", wood);
            localStorage.setItem("stone", stone);
            localStorage.setItem("tp", tpUnlocked);
            alert("Game Progress Saved!");
        }

        function loadGame() {
            wood = Number(localStorage.getItem("wood")) || 0;
            stone = Number(localStorage.getItem("stone")) || 0;
            tpUnlocked = localStorage.getItem("tp") === "true";

            if (tpUnlocked) {
                document.getElementById("teleporter").style.display = "block";
                document.getElementById("shop").style.display = "block";
            } else {
                document.getElementById("teleporter").style.display = "none";
                document.getElementById("shop").style.display = "none";
            }
        }

        loadGame();
        update();
    </script>
</body>
</html>
