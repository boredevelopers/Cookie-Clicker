=<!DOCTYPE html>
<html>
<head>
<title>Island Builder</title>

<style>

body {
    margin:0;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
}


/* =========================
   WORLD
========================= */

#game {

    width:100vw;
    height:100vh;

    position:relative;

    background:
    linear-gradient(
        to bottom,
        #87ceeb 0%,
        #87ceeb 55%,
        #3cb371 55%,
        #2e8b57 100%
    );
}


/* =========================
   TOP BAR
========================= */

#topBar {

    position:fixed;
    top:10px;
    right:10px;

    z-index:1000;

}


button {

    cursor:pointer;
    padding:8px;
}


/* =========================
   WORLD OBJECTS
========================= */

.object {

    position:absolute;

    image-rendering:pixelated;

    cursor:pointer;

    transition:0.15s;

}


.object:hover {

    transform:scale(1.1);

}


#tree {

    width:250px;

    left:35%;
    top:45%;

}


#rock {

    width:180px;

    left:65%;
    top:55%;

}


/* TELEPORTER */

#teleporter {

    width:120px;

    left:50%;
    top:70%;

}


/* =========================
   QUARRY
========================= */

#quarry {

    display:none;

    width:100vw;
    height:100vh;

    background:

    linear-gradient(
        to bottom,
        #555,
        #222
    );

    position:absolute;

}


#miner {

    width:220px;

    position:absolute;

    left:45%;
    top:45%;

}



/* =========================
   TEXT
========================= */


#stats {

    position:absolute;

    top:70px;
    left:20px;

    background:rgba(0,0,0,0.4);

    padding:10px;

}


.floating {


    position:absolute;

    animation:float 1s forwards;

}



@keyframes float {


    from {

        opacity:1;
        transform:translateY(0);

    }


    to {

        opacity:0;
        transform:translateY(-60px);

    }

}


</style>

</head>


<body>


<div id="topBar">

<button onclick="saveGame()">Save</button>

</div>



<div id="game">


<img id="tree"
class="object"
src="assets/tree.png"
onclick="gatherWood()">



<img id="rock"
class="object"
src="assets/rock.png"
onclick="gatherStone()">



<img id="teleporter"
class="object"
src="assets/teleporter.png"
onclick="useTeleporter()"
style="display:none;">



<div id="stats"></div>


</div>




<div id="quarry">


<img id="miner"
src="assets/miner.png"
onclick="mineStone()">



</div>





<script>


/* =========================
   STATE
========================= */


let wood = 0;

let stone = 0;


let teleporterUnlocked = false;


let locationName = "Island";





/* =========================
   RESOURCES
========================= */


function gatherWood(){


wood++;


showText("+1 Wood");


update();



}



function gatherStone(){


stone++;


showText("+1 Stone");


update();


}





function mineStone(){


stone++;


showText("+1 Stone");


update();


}





/* =========================
   TELEPORTER
========================= */


function unlockTeleporter(){


if(
wood >=100 &&
stone >=50 &&
!teleporterUnlocked
){

wood-=100;

stone-=50;


teleporterUnlocked=true;


document.getElementById("teleporter")
.style.display="block";


alert("Teleporter unlocked!");

}


}





function useTeleporter(){


if(teleporterUnlocked){


document.getElementById("game")
.style.display="none";


document.getElementById("quarry")
.style.display="block";


locationName="Quarry";


update();


}



}





/* =========================
   TEXT EFFECT
========================= */


function showText(text){


let t=document.createElement("div");


t.innerText=text;


t.className="floating";


t.style.left="50%";

t.style.top="50%";


document.body.appendChild(t);



setTimeout(()=>{


t.remove();


},1000);



}





/* =========================
   UI
========================= */


function update(){


document.getElementById("stats")
.innerHTML=

`
Location: ${locationName}
<br>
Wood: ${wood}
<br>
Stone: ${stone}
<br>
<br>

<button onclick="unlockTeleporter()">
Unlock Teleporter
<br>
100 Wood + 50 Stone
</button>

`;



}





/* =========================
   SAVE
========================= */


function saveGame(){


localStorage.setItem(
"wood",
wood
);


localStorage.setItem(
"stone",
stone
);


localStorage.setItem(
"teleporter",
teleporterUnlocked
);



alert("Saved!");



}




/* =========================
   LOAD
========================= */


function loadGame(){


wood=
Number(localStorage.getItem("wood"))
||0;


stone=
Number(localStorage.getItem("stone"))
||0;



teleporterUnlocked=
localStorage.getItem("teleporter")
==="true";



if(teleporterUnlocked){


document.getElementById("teleporter")
.style.display="block";


}



}





loadGame();

update();



</script>


</body>
</html>
