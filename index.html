<!DOCTYPE html>
<html>
<head>
    <title>Cookie Clicker</title>

    <!-- =========================
         CSS / STYLING
    ========================== -->
    <style>

        /* Cookie click animation */
        @keyframes clickBounce {
            0%   { transform: scale(1); }
            50%  { transform: scale(0.85); }
            100% { transform: scale(1); }
        }

        .clicked {
            animation: clickBounce 0.15s ease;
        }

        /* Main page styling */
        body {
            background-color: chocolate;
            font-family: Arial;
            color: white;
            margin: 0;
        }

        /* Main game area */
        #game {
            text-align: center;
            position: relative;
        }

        /* Shop panel */
        #shop {
            position: fixed;
            right: 0;
            top: 0;
            width: 200px;
            height: 100vh;
            background: #f5e0b7;
            color: black;
            padding: 15px;
            text-align: left;
        }

        .item {
            margin-bottom: 15px;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 8px;
            cursor: pointer;
        }

        /* Floating +1 text */
        .floating {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px);
            }
        }

    </style>
</head>

<body>

<!-- =========================
     SAVE BUTTON
========================== -->
<button onclick="saveGame()">Save Game</button>

<!-- =========================
     GAME AREA
========================== -->
<div id="game">

    <!-- Main Cookie -->
    <img id="cookie"
    src="COOKIE_URL"
    onclick="clickCookie()"
    style="width:200px; cursor:pointer;"
    alt="cookie">

    <!-- Cookie Counter -->
    <p id="cookieCount">Cookies: 0</p>

</div>

<!-- =========================
     SHOP
========================== -->
<div id="shop">

    <h2>Shop</h2>

    <!-- Cursor Upgrade -->
    <div class="item">
        <button onclick="buyCursor()">Buy Cursor</button>
        <p id="cursorInfo"></p>
    </div>

    <!-- Grandma Upgrade -->
    <div class="item">
        <button onclick="buyGrandma()">Buy Grandma</button>
        <p id="grandmaInfo"></p>
    </div>

</div>

<script>

/* =========================
   PLAYER STATISTICS
========================= */
let totalClicks = 0;
let totalCookiesBaked = 0;
let playTime = 0;

/* =========================
   SAVE / LOAD SYSTEM
========================= */

function saveGame() {
    const gameData = {
        cookies: cookies,
        cookiesPerSecond: cookiesPerSecond,
        cursor: cursor,
        grandma: grandma,
        totalClicks: totalClicks,
        totalCookiesBaked: totalCookiesBaked,
        playTime: playTime
    };
    localStorage.setItem("cookieGameSave", JSON.stringify(gameData));
}

function loadGame() {
    const savedData = localStorage.getItem("cookieGameSave");
    if (savedData) {
        const gameData = JSON.parse(savedData);
        cookies = gameData.cookies;
        cookiesPerSecond = gameData.cookiesPerSecond;
        cursor = gameData.cursor;
        grandma = gameData.grandma;
        totalClicks = gameData.totalClicks;
        totalCookiesBaked = gameData.totalCookiesBaked;
        playTime = gameData.playTime;
    }
}

/* =========================
   GAME VARIABLES
========================= */

let cookies = 0;
let cookiesPerSecond = 0;

let cursor = {
    cost: 10,
    owned: 0,
    cps: 1
};

let grandma = {
    cost: 100,
    owned: 0,
    cps: 5
};

/* =========================
   UI UPDATES
========================= */

function updateScreen() {
    ...
}

/* =========================
   COOKIE CLICKING
========================= */

function clickCookie() {
    totalClicks++;
    totalCookiesBaked++;
}

/* =========================
   SHOP PURCHASES
========================= */

function buyCursor() {
    ...
}

function buyGrandma() {
    ...
}

/* =========================
   AUTOMATIC COOKIE GENERATION
========================= */

setInterval(function() {
    cookies += cookiesPerSecond;
    updateScreen();
}, 1000);

cookies += cookiesPerSecond;
totalCookiesBaked += cookiesPerSecond;

setInterval(function() {
    playTime++;
}, 1000);

/* =========================
   AUTO SAVE
========================= */

loadGame();

setInterval(saveGame, 5000);

</script>

</body>
</html>
