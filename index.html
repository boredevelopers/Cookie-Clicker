<!DOCTYPE html>
<html>
<head>
<title>Island Builder</title>

<style>

body {
    margin:0;
    font-family:Arial;
    color:white;
    background:#87ceeb;
}

#game {
    text-align:center;
    padding-top:70px;
}

#topBar {
    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
}

button {
    cursor:pointer;
    padding:8px;
}


#shop {
    position:fixed;
    right:-260px;
    top:0;
    width:240px;
    height:100vh;
    background:#f5e0b7;
    color:black;
    padding:15px;
    transition:.3s;
}

#shop.open {
    right:0;
}


#backpack {
    position:fixed;
    left:-260px;
    top:0;
    width:240px;
    height:100vh;
    background:#333;
    padding:15px;
    transition:.3s;
}


#backpack.open {
    left:0;
}


img {

    width:200px;
    cursor:pointer;
    image-rendering:pixelated;

}


#quarry {
    display:none;
}



</style>

</head>


<body>


<div id="topBar">

<button onclick="toggleShop()">Shop</button>

<button onclick="toggleBackpack()">🎒 Backpack</button>

<button onclick="saveGame()">Save</button>

</div>



<div id="game">


<div id="island">


<h1>🌴 Island</h1>


<img src="assets/tree.png" onclick="gatherWood()">


<p id="woodText">
Wood:0
</p>


<button onclick="unlockTeleporter()">
Unlock Teleporter (250 Wood)
</button>


</div>




<div id="quarry">


<h1>🪨 Quarry</h1>


<img src="assets/miner.png" onclick="gatherStone()">



<p id="stoneText">
Stone:0
</p>



<button onclick="returnIsland()">
Return Island
</button>



</div>



<p id="stats">
Time:0
</p>


</div>





<!-- SHOP -->

<div id="shop">


<h2>Shop</h2>


<button onclick="buyLumberjack()">
Lumberjack 🪓
</button>


<p id="lumberInfo"></p>



<button onclick="buyMiner()">
Miner ⛏️
</button>


<p id="minerInfo"></p>



</div>





<!-- BACKPACK -->


<div id="backpack">


<h2>🎒 Backpack</h2>


<div id="items">

Empty

</div>



</div>




<script>


/* =========================
STATE
========================= */


let wood = 0;

let stone = 0;


let woodPerSecond = 0;

let stonePerSecond = 0;


let teleporterUnlocked = false;

let shopUnlocked = false;


let locationNow = "island";



let backpack = [];



let lumberjack = {

cost:50,

owned:0,

cps:1

};



let miner = {

cost:100,

owned:0,

cps:1

};



let playTime = 0;



/* =========================
RESOURCES
========================= */


function gatherWood(){

wood++;

update();

}




function gatherStone(){

if(locationNow=="quarry"){

stone++;

update();

}

}





/* =========================
TELEPORTER
========================= */


function unlockTeleporter(){


if(wood >=250 && !teleporterUnlocked){


wood -=250;


teleporterUnlocked=true;


shopUnlocked=true;



backpack.push("Teleporter");



alert("Teleporter unlocked!");



}



update();


}




function useTeleporter(){


if(locationNow=="island"){


document.getElementById("island").style.display="none";


document.getElementById("quarry").style.display="block";


locationNow="quarry";


}


else {


returnIsland();


}



}




function returnIsland(){


document.getElementById("quarry").style.display="none";


document.getElementById("island").style.display="block";


locationNow="island";


}




/* =========================
BACKPACK
========================= */


function toggleBackpack(){


document.getElementById("backpack")
.classList.toggle("open");


showItems();


}



function showItems(){


let box=document.getElementById("items");


box.innerHTML="";


if(backpack.length==0){

box.innerHTML="Empty";

}


backpack.forEach(item=>{


let button=document.createElement("button");


button.innerText=item;


button.onclick=()=>{


if(item=="Teleporter"){

useTeleporter();

}


}



box.appendChild(button);



});



}



/* =========================
SHOP
========================= */


function toggleShop(){


if(!shopUnlocked){

alert("Unlock Teleporter first!");

return;

}


document.getElementById("shop")
.classList.toggle("open");

}




function buyLumberjack(){


if(wood>=lumberjack.cost){


wood-=lumberjack.cost;


woodPerSecond+=lumberjack.cps;


lumberjack.owned++;


lumberjack.cost*=2;


}


update();


}





function buyMiner(){


if(wood>=miner.cost){


wood-=miner.cost;


stonePerSecond+=miner.cps;


miner.owned++;


miner.cost*=2;


}


update();


}




/* =========================
UPDATE UI
========================= */


function update(){


document.getElementById("woodText")
.innerText="Wood: "+wood;


document.getElementById("stoneText")
.innerText="Stone: "+stone;



document.getElementById("lumberInfo")
.innerText=
"Owned:"+lumberjack.owned+
" Cost:"+lumberjack.cost;



document.getElementById("minerInfo")
.innerText=
"Owned:"+miner.owned+
" Cost:"+miner.cost;



document.getElementById("stats")
.innerText=
"Time:"+playTime;



}



/* =========================
GAME LOOP
========================= */


setInterval(()=>{


wood+=woodPerSecond;


stone+=stonePerSecond;


playTime++;


update();



},1000);





/* =========================
SAVE LOAD
========================= */


function saveGame(){


localStorage.setItem("wood",wood);

localStorage.setItem("stone",stone);

localStorage.setItem(
"teleporter",
teleporterUnlocked
);


localStorage.setItem(
"shop",
shopUnlocked
);


localStorage.setItem(
"backpack",
JSON.stringify(backpack)
);



alert("Saved");


}





function loadGame(){


wood=
Number(localStorage.getItem("wood"))||0;


stone=
Number(localStorage.getItem("stone"))||0;



teleporterUnlocked=
localStorage.getItem("teleporter")=="true";



shopUnlocked=
localStorage.getItem("shop")=="true";



backpack=
JSON.parse(
localStorage.getItem("backpack")
)||[];



}



/* START */


loadGame();

update();


</script>


</body>
</html>
