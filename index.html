<!DOCTYPE html>
<html>
<head>
    <title>Cookie Clicker</title>

    <style>
        @keyframes clickBounce {
            0% { transform: scale(1); }
            50% { transform: scale(0.85); }
            100% { transform: scale(1); }
        }

        .clicked {
            animation: clickBounce 0.15s ease;
        }

        body {
            background-color: chocolate;
            font-family: Arial;
            color: white;
            margin: 0;
        }

        #game {
            text-align: center;
            position: relative;
        }

        #shop {
            position: fixed;
            right: 0;
            top: 0;
            width: 200px;
            height: 100vh;
            background: #f5e0b7;
            color: black;
            padding: 15px;
            text-align: left;
        }

        .item {
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 8px;
            cursor: pointer;
        }

        .floating {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>

<body>

<button onclick="saveGame()">Save Game</button>

<div id="game">

    <img id="cookie"
    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTuBjR56NYPaPmWCSxTuyLyzt77zyYvVSMI6A&s"
    onclick="clickCookie()"
    style="width:200px; cursor:pointer;"
    alt="cookie">

    <p id="cookieCount">Cookies: 0</p>

    <p id="stats"></p>
</div>

<div id="shop">
    <h2>Shop</h2>

    <div class="item">
        <button onclick="buyCursor()">Buy Cursor</button>
        <p id="cursorInfo"></p>
    </div>

    <div class="item">
        <button onclick="buyGrandma()">Buy Grandma</button>
        <p id="grandmaInfo"></p>
    </div>
</div>

<script>

/* =========================
   GAME VARIABLES
========================= */
let cookies = 0;
let cookiesPerSecond = 0;

let cursor = { cost: 10, owned: 0, cps: 1 };
let grandma = { cost: 100, owned: 0, cps: 5 };

let totalClicks = 0;
let totalCookies = 0;
let playTime = 0;

/* =========================
   SAVE / LOAD
========================= */
function saveGame() {
    localStorage.setItem("cookies", cookies);
    localStorage.setItem("cookiesPerSecond", cookiesPerSecond);
    localStorage.setItem("cursor", JSON.stringify(cursor));
    localStorage.setItem("grandma", JSON.stringify(grandma));
    localStorage.setItem("totalClicks", totalClicks);
    localStorage.setItem("totalCookies", totalCookies);
    localStorage.setItem("playTime", playTime);
}

function loadGame() {
    cookies = Number(localStorage.getItem("cookies")) || 0;
    cookiesPerSecond = Number(localStorage.getItem("cookiesPerSecond")) || 0;

    cursor = JSON.parse(localStorage.getItem("cursor")) || cursor;
    grandma = JSON.parse(localStorage.getItem("grandma")) || grandma;

    totalClicks = Number(localStorage.getItem("totalClicks")) || 0;
    totalCookies = Number(localStorage.getItem("totalCookies")) || 0;
    playTime = Number(localStorage.getItem("playTime")) || 0;
}

/* =========================
   UI UPDATE
========================= */
function updateScreen() {
    document.getElementById("cookieCount").innerText =
        "Cookies: " + cookies;

    document.getElementById("cursorInfo").innerText =
        `Owned: ${cursor.owned} | Cost: ${cursor.cost} | +${cursor.cps}/sec`;

    document.getElementById("grandmaInfo").innerText =
        `Owned: ${grandma.owned} | Cost: ${grandma.cost} | +${grandma.cps}/sec`;

    document.getElementById("stats").innerText =
        `Clicks: ${totalClicks} | Total Cookies: ${totalCookies} | Time: ${playTime}s`;
}

/* =========================
   CLICK COOKIE
========================= */
function clickCookie() {
    cookies++;
    totalClicks++;
    totalCookies++;

    let cookie = document.getElementById("cookie");
    cookie.classList.remove("clicked");
    void cookie.offsetWidth;
    cookie.classList.add("clicked");

    updateScreen();
}

/* =========================
   BUY SYSTEM
========================= */
function buyCursor() {
    if (cookies >= cursor.cost) {
        cookies -= cursor.cost;
        cursor.owned++;
        cookiesPerSecond += cursor.cps;
        cursor.cost = Math.floor(cursor.cost * 1.2);
        updateScreen();
    }
}

function buyGrandma() {
    if (cookies >= grandma.cost) {
        cookies -= grandma.cost;
        grandma.owned++;
        cookiesPerSecond += grandma.cps;
        grandma.cost = Math.floor(grandma.cost * 1.2);
        updateScreen();
    }
}

/* =========================
   CPS LOOP
========================= */
setInterval(() => {
    cookies += cookiesPerSecond;
    totalCookies += cookiesPerSecond;
    updateScreen();
}, 1000);

/* =========================
   PLAY TIME
========================= */
setInterval(() => {
    playTime++;
}, 1000);

/* =========================
   AUTO SAVE
========================= */
setInterval(saveGame, 5000);

/* START */
loadGame();
updateScreen();

</script>

</body>
</html>
