<!DOCTYPE html>
<html>
<head>
<title>Island Builder</title>

<style>

body {
    margin:0;
    font-family:Arial,sans-serif;
    color:white;
    background:linear-gradient(
        to bottom,
        #87ceeb 0%,
        #87ceeb 55%,
        #3cb371 55%,
        #2e8b57 100%
    );
    height:100vh;
    overflow:hidden;
}


/* GAME */

#game {
    text-align:center;
    padding-top:80px;
}


/* TOP BAR */

#topBar {

    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:10px;
    z-index:2000;

}



/* SHOP */

#shop {

    position:fixed;
    right:-260px;
    top:0;
    width:240px;
    height:100vh;
    background:#f5e0b7;
    color:black;
    padding:15px;
    transition:right 0.3s ease;

}


#shop.open {

    right:0;

}




/* BACKPACK */

#backpack {

    position:fixed;
    left:10px;
    top:60px;
    background:#333;
    padding:15px;
    display:none;
    z-index:2000;

}




button {

cursor:pointer;
margin-top:6px;
padding:5px 10px;

}




/* FULL SCREEN OBJECTS */


#tree,
#quarryImage {


position:absolute;

width:100vw;

height:100vh;

object-fit:cover;

left:0;

top:0;

z-index:-1;


}



#rock,
#miner {


width:180px;

cursor:pointer;

image-rendering:pixelated;

}




#tree:hover,
#rock:hover,
#miner:hover {

transform:scale(1.05);

}



</style>


</head>



<body>



<div id="topBar">

<button onclick="toggleShop()">
☰ Shop
</button>


<button onclick="openBackpack()">
🎒 Backpack
<span id="bagNotify"></span>
</button>



<button onclick="saveGame()">
Save
</button>


</div>





<div id="game">


<div id="island">


<img id="tree"
src="assets/tree.png"
onclick="gatherWood()">



<button onclick="unlockTeleporter()">

Unlock Teleporter (250 Wood)

</button>



</div>




<div id="quarry" style="display:none;">


<img id="quarryImage"
src="assets/quarry.png">



<img id="miner"
src="assets/miner.png"
onclick="gatherStone()">



<p id="stoneText">
Stone:0
</p>


<button onclick="returnIsland()">
Return Island
</button>



</div>





<p id="woodText">
Wood:0
</p>


<p id="stats">
Time:0s
</p>



</div>





<!-- SHOP -->


<div id="shop">


<h2>
Shop
</h2>



<h3>
Wood Upgrades
</h3>



<button onclick="buyLumberjack()">
Lumberjack 🪓
</button>


<p id="lumberInfo"></p>





<h3>
Stone Upgrades
</h3>


<button onclick="buyMiner()">
Miner ⛏️
</button>


<p id="minerInfo"></p>



</div>







<!-- BACKPACK -->


<div id="backpack">


<h2>
🎒 Backpack
</h2>


<div id="bagItems">

</div>


</div>








<script>


/* =========================
STATE
========================= */


let wood = 0;

let stone = 0;



let woodPerSecond = 0;

let stonePerSecond = 0;



let playTime = 0;



let teleporterUnlocked=false;

let shopUnlocked=false;



let backpack=[];



let locationNow="island";





let lumberjack={

cost:50,

owned:0,

cps:1

};



let miner={

cost:100,

owned:0,

cps:1

};








/* =========================
RESOURCES
========================= */


function gatherWood(){


wood++;


updateScreen();


}





function gatherStone(){


if(locationNow=="quarry"){


stone++;


updateScreen();


}


}








/* =========================
TELEPORTER
========================= */



function unlockTeleporter(){


if(wood>=250 && !teleporterUnlocked){


wood-=250;


teleporterUnlocked=true;


shopUnlocked=true;



backpack.push("Teleporter");



document.getElementById("bagNotify")
.innerText=" (1 new item)";



alert("Teleporter unlocked!");



}


updateScreen();


}







function goQuarry(){


document.getElementById("island")
.style.display="none";



document.getElementById("quarry")
.style.display="block";



locationNow="quarry";


}






function returnIsland(){


document.getElementById("quarry")
.style.display="none";



document.getElementById("island")
.style.display="block";



locationNow="island";


}








/* =========================
BACKPACK
========================= */



function openBackpack(){


let bag=document.getElementById("backpack");


bag.style.display =

bag.style.display=="block"

?

"none"

:

"block";



let items=document.getElementById("bagItems");



items.innerHTML="";



backpack.forEach(item=>{



let btn=document.createElement("button");



btn.innerText=item;



btn.onclick=function(){


if(item=="Teleporter"){


goQuarry();


}


};



items.appendChild(btn);



});



}









/* =========================
SHOP
========================= */



function toggleShop(){


if(!shopUnlocked){


alert("Unlock Teleporter first!");

return;


}



document.getElementById("shop")
.classList.toggle("open");



}







function buyLumberjack(){


if(wood>=lumberjack.cost){


wood-=lumberjack.cost;


woodPerSecond+=lumberjack.cps;


lumberjack.owned++;


lumberjack.cost=Math.floor(lumberjack.cost*1.2);



}


updateScreen();


}





function buyMiner(){


if(wood>=miner.cost){


wood-=miner.cost;


stonePerSecond+=miner.cps;


miner.owned++;


miner.cost=Math.floor(miner.cost*1.2);



}


updateScreen();


}








/* =========================
UI
========================= */



function updateScreen(){



document.getElementById("woodText")
.innerText="Wood: "+wood;



document.getElementById("stoneText")
.innerText="Stone: "+stone;



document.getElementById("lumberInfo")
.innerText=
"Owned: "+lumberjack.owned+
" Cost: "+lumberjack.cost;



document.getElementById("minerInfo")
.innerText=
"Owned: "+miner.owned+
" Cost: "+miner.cost;



document.getElementById("stats")
.innerText=
"Time: "+playTime+"s";



}








/* =========================
LOOP
========================= */



setInterval(()=>{


wood+=woodPerSecond;


stone+=stonePerSecond;


playTime++;


updateScreen();



},1000);








/* =========================
SAVE LOAD
========================= */



function saveGame(){


localStorage.setItem("wood",wood);


localStorage.setItem("stone",stone);


localStorage.setItem(
"teleporter",
teleporterUnlocked
);



localStorage.setItem(
"shop",
shopUnlocked
);



localStorage.setItem(
"backpack",
JSON.stringify(backpack)
);



}





function loadGame(){


wood=
Number(localStorage.getItem("wood"))||0;



stone=
Number(localStorage.getItem("stone"))||0;



teleporterUnlocked=
localStorage.getItem("teleporter")=="true";



shopUnlocked=
localStorage.getItem("shop")=="true";



backpack=
JSON.parse(
localStorage.getItem("backpack")
)||[];



}





loadGame();

updateScreen();



</script>


</body>
</html>
